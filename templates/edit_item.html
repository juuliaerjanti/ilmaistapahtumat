<!DOCTYPE html>
<html>

<head>
  <title>Tapahtumailmoituksen päivitys</title>
</head>

<body>
  <h1>Tapahtumailmoituksen päivitys</h1>
  <form action="/update_event/{{ item.id }}" method="POST">
    <p>
      Otsikko: <br />
      <input type="text" name="title" size="50" value="{{ item.title }}"/>
    </p>
    <p>
      Kuvaus: <br />
      <textarea  name ="description" rows="10" cols="70">{{ item.description }}</textarea>
    </p>
    <p>
      Päivämäärä: <br />
      <input type="text" name="date" size="10" value="{{ item.date }}"/>
    </p>
    <p>
      Kellonaika: <br />
      Klo <input type="text" name="time" size="6" value="{{ item.time }}"/>
    </p>
    <p>
      Sijainti: <br />
      <input type="text" name="location" size="20" value="{{ item.location }}"/>
    </p>

    <input type="hidden" name="item_id" value="{{ item.id }}">
    <input type="submit" value="Päivitä tapahtumailmoitus" />
  </form>
</body>

</html>
